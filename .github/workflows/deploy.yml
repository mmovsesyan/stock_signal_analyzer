name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        if: env.SERVER_HOST != ''
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            cd /root/stock_signal_analyzer
            git pull origin main || { echo "git pull failed"; exit 1; }
            docker compose build --no-cache api bot worker
            docker compose up -d --force-recreate api bot worker
            docker compose ps
            echo "Deploy completed at $(date)"

      - name: Skip deploy (no secrets)
        if: env.SERVER_HOST == ''
        run: echo "SERVER_HOST secret not set — skipping auto-deploy"
