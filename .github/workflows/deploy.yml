name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        if: env.SERVER_HOST != ''
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            cd /root/stock_signal_analyzer
            git fetch origin main
            git reset --hard origin/main
            docker compose build api bot worker
            docker compose up -d api bot worker
            docker compose ps
            # Health check
            for i in {1..10}; do
              curl -sf http://localhost:8000/health && { echo "API healthy"; break; }
              sleep 3
            done
            echo "Deploy completed at $(date)"

      - name: Skip deploy (no secrets)
        if: env.SERVER_HOST == ''
        run: echo "SERVER_HOST secret not set — skipping auto-deploy"
