name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-api.txt
          pip install -r requirements-scale.txt
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          # Lint only API, tests, and new modules (legacy analyzer/ has ~2k style issues)
          ruff check api/ tests/ stock_signal_analyzer/rate_limiter.py stock_signal_analyzer/circuit_breaker.py stock_signal_analyzer/cache.py stock_signal_analyzer/polygon_data.py stock_signal_analyzer/db.py

      - name: Type check with mypy
        run: |
          mypy stock_signal_analyzer api --ignore-missing-imports --explicit-package-bases || true

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        run: |
          docker build -t stock-signal-api .

      - name: Build Bot image
        run: |
          docker build -t stock-signal-bot .

      - name: Build Worker image
        run: |
          docker build -t stock-signal-worker .
