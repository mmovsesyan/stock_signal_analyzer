name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-api.txt
          pip install -r requirements-scale.txt
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          # Lint only files changed in this push/PR (legacy code has ~2k issues)
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- '*.py' | tr '\n' ' ')
          if [ -n "$CHANGED" ]; then
            echo "Linting changed files: $CHANGED"
            ruff check $CHANGED
          else
            echo "No Python files changed"
          fi

      - name: Type check with mypy
        run: |
          mypy stock_signal_analyzer api --ignore-missing-imports --explicit-package-bases || true

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        run: |
          docker build -t stock-signal-api .

      - name: Build Bot image
        run: |
          docker build -t stock-signal-bot .

      - name: Build Worker image
        run: |
          docker build -t stock-signal-worker .
