services:
  # Telegram бот для сбора сигналов
  bot:
    build: .
    container_name: stock-signal-bot
    restart: unless-stopped
    environment:
      - SSA_SIGNAL_LOG=/data/signals/signals.jsonl
      - STOCK_SIGNAL_DATA=/data
      - COLLECT_INTERVAL_SEC=${COLLECT_INTERVAL_SEC:-14400}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ADMIN_CHAT_ID=${ADMIN_CHAT_ID}
      - ADMIN_CONTACT_INFO=${ADMIN_CONTACT_INFO}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
      - POLYGON_API_KEY=${POLYGON_API_KEY}
      - TINKOFF_INVEST_TOKEN=${TINKOFF_INVEST_TOKEN}
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama_cloud}
      - OLLAMA_CLOUD_API_KEY=${OLLAMA_CLOUD_API_KEY}
      - OLLAMA_CLOUD_MODEL=${OLLAMA_CLOUD_MODEL:-qwen2.5:4b}
      - LLM_SENTIMENT=${LLM_SENTIMENT:-1}
      - NOTIFY_INTERVAL_SEC=${NOTIFY_INTERVAL_SEC:-3600}
      - NOTIFY_MIN_TIER=${NOTIFY_MIN_TIER:-}
      - DATABASE_URL=postgresql://ssa:${POSTGRES_PASSWORD}@postgres:5432/stock_signals
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    command: telegram_bot.py
    networks:
      - stock-signal-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Outcome tracker (запускается по расписанию)
  tracker:
    build: .
    container_name: stock-signal-tracker
    restart: unless-stopped
    environment:
      - SSA_SIGNAL_LOG=/data/signals/signals.jsonl
      - STOCK_SIGNAL_DATA=/data
      - TINKOFF_INVEST_TOKEN=${TINKOFF_INVEST_TOKEN}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
      - POLYGON_API_KEY=${POLYGON_API_KEY}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    command: -m stock_signal_analyzer.outcome_tracker
    networks:
      - stock-signal-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Cron для периодического запуска tracker и learning
  cron:
    image: alpine:latest
    container_name: stock-signal-cron
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: >
      sh -c "
      apk add --no-cache docker-cli &&
      echo '0 * * * * docker start stock-signal-tracker' | crontab - &&
      echo '30 */6 * * * docker start stock-signal-learning' >> /var/spool/cron/crontabs/root &&
      crond -f -l 2
      "
    networks:
      - stock-signal-net

  # LLM Learning (запускается по расписанию)
  learning:
    build: .
    container_name: stock-signal-learning
    restart: unless-stopped
    environment:
      - SSA_SIGNAL_LOG=/data/signals/signals.jsonl
      - STOCK_SIGNAL_DATA=/data
      - TINKOFF_INVEST_TOKEN=${TINKOFF_INVEST_TOKEN}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
      - POLYGON_API_KEY=${POLYGON_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama_cloud}
      - OLLAMA_CLOUD_API_KEY=${OLLAMA_CLOUD_API_KEY}
      - OLLAMA_CLOUD_MODEL=${OLLAMA_CLOUD_MODEL:-qwen2.5:4b}
      - LLM_LEARNING=${LLM_LEARNING:-1}
      - LLM_LEARNING_MIN=${LLM_LEARNING_MIN:-20}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    command: -m stock_signal_analyzer.llm_learning
    networks:
      - stock-signal-net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # REST API (FastAPI)
  api:
    build: .
    container_name: stock-signal-api
    restart: unless-stopped
    environment:
      - SSA_SIGNAL_LOG=/data/signals/signals.jsonl
      - STOCK_SIGNAL_DATA=/data
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ADMIN_CHAT_ID=${ADMIN_CHAT_ID}
      - ADMIN_CONTACT_INFO=${ADMIN_CONTACT_INFO}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
      - POLYGON_API_KEY=${POLYGON_API_KEY}
      - TINKOFF_INVEST_TOKEN=${TINKOFF_INVEST_TOKEN}
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama_cloud}
      - OLLAMA_CLOUD_API_KEY=${OLLAMA_CLOUD_API_KEY}
      - OLLAMA_CLOUD_MODEL=${OLLAMA_CLOUD_MODEL:-qwen2.5:4b}
      - LLM_SENTIMENT=${LLM_SENTIMENT:-1}
      - API_RATE_LIMIT_PER_MIN=${API_RATE_LIMIT_PER_MIN:-30}
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://ssa:${POSTGRES_PASSWORD}@postgres:5432/stock_signals
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - SCHEDULER_MODE=disabled
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    command: -m uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 2
    depends_on:
      - postgres
      - redis
    networks:
      - stock-signal-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: stock-signal-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=stock_signals
      - POSTGRES_USER=ssa
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - stock-signal-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ssa -d stock_signals"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (очередь задач + кэш)
  redis:
    image: redis:7-alpine
    container_name: stock-signal-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - stock-signal-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Celery Worker (обработка задач)
  worker:
    build: .
    container_name: stock-signal-worker
    restart: unless-stopped
    environment:
      - SSA_SIGNAL_LOG=/data/signals/signals.jsonl
      - STOCK_SIGNAL_DATA=/data
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ADMIN_CHAT_ID=${ADMIN_CHAT_ID}
      - ADMIN_CONTACT_INFO=${ADMIN_CONTACT_INFO}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
      - POLYGON_API_KEY=${POLYGON_API_KEY}
      - TINKOFF_INVEST_TOKEN=${TINKOFF_INVEST_TOKEN}
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama_cloud}
      - OLLAMA_CLOUD_API_KEY=${OLLAMA_CLOUD_API_KEY}
      - OLLAMA_CLOUD_MODEL=${OLLAMA_CLOUD_MODEL:-qwen2.5:4b}
      - LLM_SENTIMENT=${LLM_SENTIMENT:-1}
      - DATABASE_URL=postgresql://ssa:${POSTGRES_PASSWORD}@postgres:5432/stock_signals
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    command: -m celery -A stock_signal_analyzer.tasks worker --loglevel=info --concurrency=4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - stock-signal-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Celery Beat (периодические задачи)
  beat:
    build: .
    container_name: stock-signal-beat
    restart: unless-stopped
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - DATABASE_URL=postgresql://ssa:${POSTGRES_PASSWORD}@postgres:5432/stock_signals
    command: -m celery -A stock_signal_analyzer.tasks beat --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - stock-signal-net
    healthcheck:
      test: ["CMD-SHELL", "grep -ao 'celery' /proc/1/cmdline >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

networks:
  stock-signal-net:
    driver: bridge

volumes:
  data:
  logs:
  postgres_data:
  redis_data:
